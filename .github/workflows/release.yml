name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: mdbook-tagging
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: mdbook-tagging
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: mdbook-tagging
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: mdbook-tagging.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} mdbook-tagging-${{ matrix.target }}${{ matrix.binary == 'mdbook-tagging.exe' && '.exe' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdbook-tagging-${{ matrix.target }}
          path: mdbook-tagging-${{ matrix.target }}*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: mdbook-tagging-*
